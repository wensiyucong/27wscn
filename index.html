<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文思导航 - 炫酷网站导航</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 鼠标跟随光晕 -->
    <div class="cursor-glow" id="cursor-glow"></div>

    <!-- 粒子背景容器 -->
    <canvas id="particles-canvas"></canvas>

    <!-- 扫光效果 -->
    <div class="shine-effect"></div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-compass"></i>
                <h1>文思导航</h1>
                <span class="version">v3.0</span>
            </div>
            <div class="header-controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="搜索网站或分类...">
                    <div class="search-results" id="search-results"></div>
                </div>
                <div class="theme-toggle">
                    <span class="theme-text" id="theme-text">浅色模式</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="theme-switch">
                        <label for="theme-switch" class="toggle-slider">
                            <span class="toggle-icon sun"><i class="fas fa-sun"></i></span>
                            <span class="toggle-icon moon"><i class="fas fa-moon"></i></span>
                        </label>
                    </div>
                </div>
            </div>
        </header>

        <!-- 分类标签导航 -->
        <nav class="categories-nav" id="categories-nav">
            <!-- 由 JS 动态生成 -->
        </nav>

        <!-- 网站展示区域 -->
        <main class="sites-container" id="sites-container">
            <!-- 由 JS 动态生成 -->
        </main>

        <!-- ===== 页脚：左统计 + 中版权 + 右联系方式 ===== -->
        <footer>
            <div class="footer-left">
                <p class="site-count" id="site-count">
                    <i class="fas fa-globe"></i>
                    共收录 <strong id="total-sites">0</strong> 个网站
                </p>
            </div>
            <div class="footer-center">
                <p>© 2026 文思导航 · 探索精彩网络世界</p>
            </div>
            <div class="footer-right">
                <span class="contact-item" title="站长微博">
                    <a href="https://weibo.com/399520" target="_blank" rel="noopener">
                        <i class="fab fa-weibo"></i>
                    </a>
                </span>
                <span class="contact-item" title="点击复制微信号">
                    <a href="javascript:void(0)" id="contact-wechat">
                        <i class="fab fa-weixin"></i>
                    </a>
                </span>
                <span class="contact-item" title="站长QQ">
                    <a href="https://wpa.qq.com/msgrd?v=3&uin=624863079&site=qq&menu=yes" target="_blank" rel="noopener">
                        <i class="fab fa-qq"></i>
                    </a>
                </span>
                <span class="contact-item" title="站长X（Twitter）">
                    <a href="https://x.com/ChenSiYuCong" target="_blank" rel="noopener">
                        <i class="fab fa-twitter"></i>
                    </a>
                </span>
                <span class="contact-item" title="站长Facebook">
                    <a href="https://www.facebook.com/wensiyucong" target="_blank" rel="noopener">
                        <i class="fab fa-facebook"></i>
                    </a>
                </span>
                <span class="contact-item" title="站长Telegram">
                    <a href="https://t.me/wensiyucong" target="_blank" rel="noopener">
                        <i class="fab fa-telegram"></i>
                    </a>
                </span>
                <span class="contact-item" title="发送邮件">
                    <a href="mailto:ccw@27ws.cn">
                        <i class="fas fa-envelope"></i>
                    </a>
                </span>
                <span class="contact-divider">|</span>
                <a href="javascript:void(0)" id="about-link" class="footer-link">关于</a>
                <a href="javascript:void(0)" id="feedback-link" class="footer-link">反馈</a>
            </div>
        </footer>
        <!-- ===== 页脚结束 ===== -->
    </div>

    <!-- ===== 微信二维码悬浮弹窗 ===== -->
    <div class="wechat-overlay" id="wechat-overlay">
        <div class="wechat-modal" id="wechat-modal">
            <button class="wechat-close" id="wechat-close">&times;</button>
            <div class="wechat-modal-header">
                <i class="fab fa-weixin"></i>
                <h3>添加站长微信</h3>
            </div>
            <div class="wechat-modal-body">
                <div class="wechat-qr-wrapper">
                    <img
                    src="csycewm.jpg"
                    alt="微信二维码"
                    class="wechat-qr-img"
                    id="wechat-qr-img"
                    >
                </div>
                <div class="wechat-info">
                    <span class="wechat-label">微信号：</span>
                    <span class="wechat-id" id="wechat-id-display">wensiyucong</span>
                    <button class="wechat-copy-btn" id="wechat-copy-btn">
                        <i class="fas fa-copy"></i> 复制微信号
                    </button>
                </div>
                <div class="wechat-toast" id="wechat-toast">
                    <i class="fas fa-check-circle"></i> 微信号已复制
                </div>
            </div>
            <div class="wechat-modal-footer">
                <p>长按二维码也可添加好友</p>
            </div>
        </div>
    </div>
    <!-- ===== 微信弹窗结束 ===== -->

    <!-- ===== 关于弹窗 ===== -->
    <div class="about-overlay" id="about-overlay">
        <div class="about-modal">
            <button class="about-close" id="about-close">&times;</button>
            <div class="about-modal-header">
                <i class="fas fa-compass"></i>
                <h3>关于文思导航</h3>
            </div>
            <div class="about-modal-body">
                <div class="about-logo-text">文思导航 v3.0</div>
                <p class="about-desc">探索精彩网络世界<br>收录优质网站，助您高效上网。</p>
                <p class="about-copy">© 2026 文思工作室</p>
            </div>
        </div>
    </div>
    <!-- ===== 关于弹窗结束 ===== -->

    <!-- ===== 反馈弹窗 ===== -->
    <div class="feedback-overlay" id="feedback-overlay">
        <div class="feedback-modal">
            <button class="feedback-close" id="feedback-close">&times;</button>
            <div class="feedback-modal-header">
                <i class="fas fa-comment-dots"></i>
                <h3>反馈建议</h3>
            </div>
            <div class="feedback-modal-body">
                <p class="feedback-desc">感谢您的反馈！请发送邮件至：</p>
                <div class="feedback-email-row">
                    <a href="mailto:ccw@27ws.cn" class="feedback-email-link">
                        <i class="fas fa-envelope"></i> ccw@27ws.cn
                    </a>
                    <button class="feedback-copy-btn" id="feedback-copy-btn">
                        <i class="fas fa-copy"></i> 复制
                    </button>
                </div>
                <div class="feedback-toast" id="feedback-toast">
                    <i class="fas fa-check-circle"></i> 邮箱地址已复制
                </div>
            </div>
        </div>
    </div>
    <!-- ===== 反馈弹窗结束 ===== -->

    <!-- 先加载 sites.js（外部数据），再加载 main.js（主逻辑） -->
    <script src="sites.js"></script>
    <script src="main.js"></script>

</body>
</html>
