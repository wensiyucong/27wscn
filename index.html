<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文思导航 - 炫酷网站导航</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 粒子背景容器 -->
    <canvas id="particles-canvas"></canvas>

    <!-- 扫光效果 -->
    <div class="shine-effect"></div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-compass"></i>
                <h1>文思导航</h1>
                <span class="version">v2.0</span>
            </div>
            <div class="header-controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="搜索网站或分类...">
                    <div class="search-results" id="search-results"></div>
                </div>
                <div class="theme-toggle">
                    <span class="theme-text" id="theme-text">浅色模式</span>
                    <div class="toggle-switch">
                        <input type="checkbox" id="theme-switch">
                        <label for="theme-switch" class="toggle-slider">
                            <span class="toggle-icon sun"><i class="fas fa-sun"></i></span>
                            <span class="toggle-icon moon"><i class="fas fa-moon"></i></span>
                        </label>
                    </div>
                </div>
            </div>
        </header>

        <!-- 分类标签导航 -->
        <nav class="categories-nav" id="categories-nav">
            <!-- 由 JS 动态生成 -->
        </nav>

        <!-- 网站展示区域 -->
        <main class="sites-container" id="sites-container">
            <!-- 由 JS 动态生成 -->
        </main>

        <!-- 页脚：左统计 + 中版权 + 右联系方式 -->
        <footer>
            <div class="footer-left">
                <p class="site-count" id="site-count">
                    <i class="fas fa-globe"></i>
                    共收录 <strong id="total-sites">0</strong> 个网站
                </p>
            </div>
            <div class="footer-center">
                <p>© 2025 文思导航 · 探索精彩网络世界</p>
            </div>
            <div class="footer-right">
                <span class="contact-item" title="站长微博">
                    <a href="https://weibo.com" target="_blank" rel="noopener">
                        <i class="fab fa-weibo"></i>
                    </a>
                </span>
                <span class="contact-item" title="点击复制微信号">
                    <a href="javascript:void(0)" id="contact-wechat">
                        <i class="fab fa-weixin"></i>
                    </a>
                </span>
                <span class="contact-item" title="站长QQ">
                    <a href="https://wpa.qq.com/msgrd?v=3&uin=123456789&site=qq&menu=yes" target="_blank" rel="noopener">
                        <i class="fab fa-qq"></i>
                    </a>
                </span>
                <span class="contact-item" title="发送邮件">
                    <a href="mailto:admin@wensii.com">
                        <i class="fas fa-envelope"></i>
                    </a>
                </span>
                <span class="contact-divider">|</span>
                <a href="javascript:void(0)" id="about-link" class="footer-link">关于</a>
                <a href="javascript:void(0)" id="feedback-link" class="footer-link">反馈</a>
            </div>
        </footer>

    </div>

    <!-- ===== 微信弹窗 (悬浮层) ===== -->
    <div id="wechat-modal" class="wechat-modal" style="display:none;">
        <div class="wechat-modal-card">
            <button class="wechat-modal-close" id="wechat-modal-close">&times;</button>
            <h3><i class="fab fa-weixin" style="color:#07c160;"></i> 站长微信</h3>
            <div class="wechat-qr-wrapper">
                <!-- 微信二维码占位图 (可替换为真实的二维码图片) -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=wensii_admin" alt="微信二维码" class="wechat-qr-img" id="wechat-qr-img">
            </div>
            <p class="wechat-id-label">微信号：<strong id="wechat-id-display">wensii_admin</strong></p>
            <p class="wechat-tip">已复制微信号，请打开微信粘贴添加</p>
            <button class="wechat-copy-btn" id="wechat-copy-btn"><i class="fas fa-copy"></i> 再次复制</button>
        </div>
    </div>

    <!-- JS 文件 -->
    <script src="sites.js"></script>
    <script src="main.js"></script>

</body>
</html>
